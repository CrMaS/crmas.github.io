<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Martin Schubert</title>
    <meta
      name="description"
      content="The personal website of Max Schubert."
    />

    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #18181b;
        background: #fafafa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .content {
        width: 100%;
        max-width: 680px;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      p {
        max-width: 560px;
        color: #52525b;
        font-size: 1.2rem;
        line-height: 1.7;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 2rem;
      }

      a {
        color: inherit;
        font-weight: 600;
        text-underline-offset: 0.25rem;
      }
    </style>
  </head>

  <body>
    <main>
      <section class="content">
        <h1>Max Schubert</h1>

        <p>
          Welcome to my personal website. I’ll add more information about my
          work, projects, and interests here soon.
        </p>

        <nav aria-label="External links">
          <a href="https://github.com/CrMaS">GitHub</a>
        </nav>
      </section>
    </main>
  </body>
</html>
